<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;600;700&family=Tenor+Sans&display=swap" rel="stylesheet">
  <style>
    body, table, td, p, a { font-family: 'Golos Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: hsl(37, 29%, 95%); color: hsl(14, 42%, 26%);">
  <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: hsl(37, 29%, 95%); padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" style="max-width: 600px; background-color: hsl(37, 33%, 98%); border: 1px solid hsl(70, 12%, 82%); border-radius: 16px; padding: 40px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
          <tr>
            <td>
              <strong style="display: block; margin-bottom: 20px; color: hsl(94, 27%, 18%); font-family: 'Tenor Sans', Georgia, serif !important; font-size: 24px; font-weight: 400; letter-spacing: 0.02em;">Alignment Retreats</strong>
              <p style="font-size: 16px; line-height: 1.6; margin-bottom: 24px;">Ready to jump back in? Click the secure link below to sign in to your account.</p>

              <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: hsl(94, 27%, 18%); color: hsl(37, 29%, 95%); padding: 14px 28px; font-weight: 600; text-decoration: none; border-radius: 30px;">Log In to Dashboard</a>

              <p style="font-size: 13px; color: hsl(14, 25%, 42%); margin-top: 30px; font-style: italic;">
                This link will expire in 24 hours and can only be used once.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
